<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aula 2</title>
    <link rel="icon" href="https://i.pinimg.com/736x/58/4b/3b/584b3b5bf8b3892cc567e10cfbfc0e76.jpg"/>
  </head>
  <body>

    <h1>TABELA INCRIVEL</h1>

    <!-- Criando uma tabela -->
    <table border="5">
        <!-- Cabecalho da tabela -->
        <thead>
            <tr>
                <th>Nome</th>
                <th>Produto</th>
                <th>Quantidade</th>
                <th>Preço</th>
            </tr>
        </thead>

        <!-- Corpo da tabela -->
        <tbody>
            <!-- crio uma linha -->
            <tr>
                <!-- crio uma coluna -->
                <tr>
                    <td>Messi</td>
                    <td>Perfume</td>
                    <td>10</td>
                    <td>100.000 </td>
        
                    
                </tr>

                <tr>
                    <td>Neymar</td>
                    <td>Perfume</td>
                    <td>7</td>
                    <td>10.000 </td>
                </tr>

                <tr>
                    <td>Halland </td>
                    <td>Perfume</td>
                    <td>5</td>
                    <td>50.000 </td>
                </tr>
                <tr>
                    <td>Mbape</td>
                    <td>Perfume</td>
                    <td>3</td>
                    <td>30.000 </td>
                </tr>
                
        </tbody>
            

        <!-- Rodape da tabela -->
        <tfoot>
            <tr>
                <!-- Colspan é para juntar as colunas -->
                <!-- Align é para alinhar o texto -->
                <td colspan="4"> 
                    &AElig; Todos os direitos &nbsp; estão
                    reservados  &copy; &Omega;
                </td>
            </tr>
        </tfoot>

    </table>
  </body>
</html>
